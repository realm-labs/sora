package = "com.sora.showcase"
includes = ["schema/game.toml"]

[build]
default_source_format = "xlsx"
data_root = "data"
schema_lock = "generated/schema.lock"
excel_templates = "generated/excel"

[[build.codegen]]
target = "rust"
out = "rust/src/generated"
format = "auto"

[[build.codegen]]
target = "kotlin"
out = "kotlin/src/generated/kotlin"

[[build.codegen]]
target = "csharp"
out = "csharp/src/generated/csharp"

[[build.codegen]]
target = "java"
out = "java/src/generated/java"

[[build.codegen]]
target = "scala"
out = "scala/src/generated/scala"

[[build.codegen]]
target = "go"
out = "go/internal/showcase"
format = "auto"

[[build.codegen]]
target = "dart"
out = "dart/lib/src/generated"
scope = "client"

[[build.codegen]]
target = "godot"
out = "godot/addons/sora_config/generated"
scope = "client"

[[build.codegen]]
target = "c"
out = "c/generated"
format = "auto"

[[build.codegen]]
target = "cpp"
out = "cpp/generated"
format = "auto"

[[build.codegen]]
target = "typescript"
out = "typescript/generated"

[[build.codegen]]
target = "javascript"
out = "javascript/generated"

[[build.codegen]]
target = "erlang"
out = "erlang/generated"
format = "auto"

[[build.codegen]]
target = "lua"
out = "lua/generated"

[[build.codegen]]
target = "python"
out = "python/generated"
format = "auto"

[[build.codegen]]
target = "proto-schema"
out = "generated/proto"

[[build.exports]]
format = "binary"
out = "generated/config.sora"
compression = "zstd"
compression_level = 3

[[build.exports]]
format = "json"
out = "generated/config.json"

[[build.exports]]
format = "json"
out = "generated/client/config.json"
scope = "client"

[[build.exports]]
format = "json"
out = "godot/config/config.json"
scope = "client"

[[build.exports]]
format = "json"
out = "generated/server/config.json"
scope = "server"

[[build.exports]]
format = "sora-protobuf"
out = "generated/config.sora.pb"

[[build.exports]]
format = "proto"
out = "generated/config.pb"

[[build.exports]]
format = "cbor"
out = "generated/config.cbor"

[[build.exports]]
format = "json-debug"
out = "generated/debug-json"

[codegen.rust]
runtime_format = "sora"
map_type = "fx_hash_map"
string_storage = "arc"

[codegen.kotlin]
runtime_format = "sora"

[codegen.csharp]
runtime_format = "sora"

[codegen.java]
runtime_format = "sora"

[codegen.scala]
runtime_format = "sora"
scala_version = "3"

[codegen.go]
runtime_format = "sora"

[codegen.dart]
runtime_format = "json"

[codegen.godot]
runtime_format = "json"

[codegen.c]
runtime_format = "sora"
c_standard = "c11"
prefix = "sora_showcase"

[codegen.cpp]
runtime_format = "sora"
cpp_standard = "c++17"
namespace = "sora::showcase"

[codegen.typescript]
runtime_format = "sora"
enum_repr = "string"

[codegen.javascript]
runtime_format = "sora"
enum_repr = "string"
emit_dts = true

[codegen.erlang]
runtime_format = "sora"
enum_repr = "atom"

[codegen.lua]
runtime_format = "sora"
module = "generated"
lua_version = "5.4"
enum_repr = "string"

[codegen.python]
runtime_format = "sora"
