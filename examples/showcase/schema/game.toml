[[tables]]
name = "Item"
mode = "map"
key = "id"

[tables.source]
file = "Core.xlsx"
sheet = "Item"

[[tables.fields]]
name = "id"
type = "i32"
key = true
required = true
comment = "Item id"

[[tables.fields]]
name = "name"
type = "string"
required = true
comment = "Display name"
length = [2, 32]

[[tables.fields]]
name = "item_type"
type = "enum<ItemType>"
required = true
comment = "Item category"

[[tables.fields]]
name = "max_stack"
type = "i32"
default = "1"
range = [1, 9999]
comment = "Stack limit; blank cells use the default"

[[tables.fields]]
name = "price"
type = "struct<ResourceCost>"
parser = { kind = "tuple" }
required = true
comment = "Tuple: kind,id,count"

[[tables.fields]]
name = "tags"
type = "set<string>"
parser = { kind = "json" }
default = "[\"misc\"]"
length = [1, 5]
comment = "JSON string set"

[[tables.fields]]
name = "attributes"
type = "map<string,i32>"
parser = { kind = "map" }
required = true
comment = "Map pairs: key,value|key,value"

[[tables.indexes]]
name = "by_name"
fields = ["name"]
unique = true

[[tables.indexes]]
name = "by_item_type"
fields = ["item_type"]

