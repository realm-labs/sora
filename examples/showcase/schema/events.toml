[[tables]]
name = "EventRule"
mode = "map"
key = "id"

[tables.source]
file = "Quest.xlsx"
sheet = "EventRule"

[[tables.fields]]
name = "id"
type = "i32"

[[tables.fields]]
name = "name"
type = "string"

[[tables.fields]]
name = "condition"
type = "union<EventCondition>"

[[tables.fields]]
