length = [1, 4]
[[tables]]
name = "ComplexRule"
mode = "map"
key = "id"

[tables.source]
file = "Complex.xlsx"
sheet = "ComplexRule"

[[tables.fields]]
name = "id"
type = "i32"

[[tables.fields]]
name = "name"
type = "string"

[[tables.fields]]
name = "root_condition"
type = "union<EventCondition>"
from = { table = "ComplexRuleCondition", parent_key = "id", child_key = "rule_id", field = "value" }
comment = "Single union value derived from a tagged_columns child row"

[[tables.fields]]
name = "root_action_group"
type = "ref<ComplexActionGroup.id>"

[[tables.fields]]
name = "actions"
type = "list<union<RewardAction>>"
from = { table = "ComplexActionEntry", parent_key = "root_action_group", child_key = "group_id", field = "value", order_by = "seq" }
comment = "Non-JSON list<union<RewardAction>> assembled from child rows"

[[tables.fields]]
name = "budget"
type = "struct<ComplexBudget>"
parser = { kind = "tuple", separator = "," }
comment = "Nested tuple, tuple_list, split, and map parsers in one cell"
