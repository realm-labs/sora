[[tables]]
name = "Skill"
mode = "map"
key = "id"

[tables.source]
file = "Battle.xlsx"
sheet = "Skill"

[[tables.fields]]
name = "id"
type = "i32"

[[tables.fields]]
name = "name"
type = "string"
length = [2, 32]

[[tables.fields]]
name = "element"
type = "enum<ElementType>"

[[tables.fields]]
name = "cost"
type = "struct<ResourceCost>"
parser = { kind = "tuple" }
comment = "Tuple cost, e.g. Gold,0,150"

[[tables.fields]]
name = "effect"
type = "struct<SkillEffect>"
comment = "JSON object with element/power/radius"

[[tables.fields]]
name = "required_level"
type = "i32"
default = "1"
range = [1, 100]

[[tables.fields]]
name = "required_item"
type = "optional<ref<Item.id>>"
comment = "Optional item requirement"

[[tables.fields]]
name = "cast_origin"
type = "struct<Vec3>"
parser = { kind = "tuple" }
