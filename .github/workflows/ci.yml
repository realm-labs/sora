name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Smoke test CLI
        run: cargo run -p sora-cli -- --version

      - name: Smoke test showcase build
        run: cargo run -p sora-cli -- build --project examples/showcase/project.toml --target rust

  studio-frontend:
    name: Studio frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/studio/package-lock.json

      - name: Install Studio dependencies
        working-directory: apps/studio
        run: npm ci

      - name: Build Studio frontend
        working-directory: apps/studio
        run: npm run build

      - name: Verify embedded Studio assets are current
        run: git diff --exit-code -- crates/sora-studio/dist

  showcase:
    name: Showcase runtimes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: sbt/setup-sbt@v1

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - uses: actions/setup-go@v6
        with:
          go-version-file: examples/showcase/go/go.mod

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python runtime dependencies
        run: python3 -m pip install -r examples/showcase/python/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install TypeScript
        run: npm install -g typescript@5.9.3

      - uses: dart-lang/setup-dart@v1

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.2"

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Regenerate showcase outputs
        run: cargo run -p sora-cli -- build --project examples/showcase/project.toml --clean

      - name: Verify showcase runtimes
        run: |
          chmod +x examples/showcase/kotlin/gradlew
          chmod +x examples/showcase/java/gradlew
          python3 scripts/verify_showcase.py --strict --only rust,kotlin,csharp,java,scala,go,python,typescript,javascript,dart,lua,erlang,c,cpp

  runtime-matrix:
    name: Runtime format matrix
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: dart-lang/setup-dart@v1

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.2"

      - uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: "5.4"

      - name: Build CLI
        run: cargo build -p sora-cli

      - name: Verify runtime format matrix
        run: python3 scripts/verify_runtime_matrix.py --sora-bin target/debug/sora --strict-tools
